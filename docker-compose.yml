services:
  db:
    image: postgres:17-alpine
    container_name: clock_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clock}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clock}
      POSTGRES_DB: ${POSTGRES_DB:-clock}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - clock_pgdata:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clock} -d ${POSTGRES_DB:-clock}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  clock_pgdata:
